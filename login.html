<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acessar Lab | Danauth Digital Hub</title>
  <link rel="stylesheet" href="/index.css">
  <link rel="icon" type="image/png" href="/assets/brand/favicon.png" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body, html {
      height: 100%;
      margin: 0;
      background: #000;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .login-container {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* Left Side - Form */
    .login-form-side {
      flex: 1;
      max-width: 550px;
      padding: 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #0a0a0a;
      z-index: 10;
      overflow-y: auto;
    }

    .login-logo {
      display: block;
      height: 220px; /* Maximus Brand Visibility */
      margin-bottom: 3.5rem;
      text-decoration: none;
      transition: transform 0.3s ease;
    }

    .login-logo:hover {
      transform: scale(1.05);
    }

    .login-logo img {
      height: 100%;
      width: auto;
      object-fit: contain;
    }

    .login-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: white;
    }

    .login-header p {
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    /* Toggle Switch */
    .auth-toggle {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 2.5rem;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .toggle-btn {
      flex: 1;
      padding: 0.8rem;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .toggle-btn.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    /* Forms */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .input-row {
      display: flex;
      gap: 1rem;
    }

    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .glass-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem 1.2rem;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .glass-input:focus {
      border-color: var(--accent-secondary);
      outline: none;
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      background: var(--accent-secondary);
      color: #000;
      border: none;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: all 0.3s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
    }

    /* Google Button Wrapper */
    .google-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
      color: rgba(255,255,255,0.2);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .google-divider::before,
    .google-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.05);
    }

    #google-login-btn {
      display: flex;
      justify-content: center;
      min-height: 40px;
    }

    /* Right Side - Visual */
    .login-visual-side {
      flex: 1;
      position: relative;
      background-image: url('/login_bg.png');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      padding: 4rem;
    }

    .login-visual-side::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
    }

    .visual-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
    }

    .visual-content h2 {
      font-size: 3rem;
      color: white;
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    .visual-content p {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
    }

    @media (max-width: 900px) {
      .login-visual-side {
        display: none;
      }
      .login-form-side {
        max-width: 100%;
        padding: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-form-side">
      <a href="/" class="login-logo">
        <img src="/assets/brand/logo.png" alt="Danauth Logo">
      </a>
      
      <div class="auth-toggle">
        <button class="toggle-btn active" id="toggle-signup" onclick="setAuthMode('signup')">Criar conta</button>
        <button class="toggle-btn" id="toggle-login" onclick="setAuthMode('login')">Entrar</button>
      </div>

      <div id="auth-flow">
        <!-- Main Form (SignUp or Login) -->
        <div id="step-1" class="auth-form">
          <div class="login-header">
            <h1 id="auth-title">Crie sua conta</h1>
            <p id="auth-subtitle">Comece a criar imagens e vídeos com IA em segundos.</p>
          </div>

          <div id="signup-fields">
            <div class="input-row">
              <div class="input-group">
                <label>Nome</label>
                <input type="text" id="lab-first-name" placeholder="Ex: Hugo" class="glass-input">
              </div>
              <div class="input-group">
                <label>Sobrenome</label>
                <input type="text" id="lab-last-name" placeholder="Ex: D." class="glass-input">
              </div>
            </div>
          </div>

          <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="lab-email" placeholder="seu@email.com" class="glass-input">
          </div>

          <div class="input-group">
            <label>Senha</label>
            <input type="password" id="lab-password" placeholder="••••••••" class="glass-input">
          </div>

          <button id="btn-lab-login" class="btn-login">Continuar</button>

          <div class="google-divider">ou acesse com</div>
          
          <!-- Container for programmatic Google button -->
          <div id="google-login-btn"></div>
        </div>

        <!-- Step 2: OTP (Only for Registration) -->
        <div id="step-2" class="auth-form" style="display: none;">
          <div class="login-header">
            <h1>Verifique seu e-mail</h1>
            <p>Enviamos um código para confirmar seu cadastro.</p>
          </div>
          <div class="input-group">
            <label>Código de confirmação</label>
            <input type="text" id="lab-otp" placeholder="6 dígitos" class="glass-input" maxlength="6" style="text-align: center; letter-spacing: 0.5rem; font-weight: 800;">
          </div>
          <button id="btn-lab-verify" class="btn-login">Finalizar Cadastro</button>
        </div>
      </div>
    </div>

    <div class="login-visual-side">
      <div class="visual-content">
        <h2>Transforme ideias em realidade digital.</h2>
        <p>Acesse o Danauth AI Lab e descubra o poder da inteligência artificial generativa de última geração.</p>
      </div>
    </div>
  </div>

  <script>
    let authMode = 'signup';
    
    function setAuthMode(mode) {
      if (window.AuthSystem) {
         window.AuthSystem.setMode(mode);
      }
      authMode = mode;
      const signupToggle = document.getElementById('toggle-signup');
      const loginToggle = document.getElementById('toggle-login');
      if (signupToggle) signupToggle.classList.toggle('active', mode === 'signup');
      if (loginToggle) loginToggle.classList.toggle('active', mode === 'login');
      
      const title = document.getElementById('auth-title');
      const subtitle = document.getElementById('auth-subtitle');
      const loginBtn = document.getElementById('btn-lab-login');
      
      if (title) title.innerText = mode === 'signup' ? 'Crie sua conta' : 'Bem-vindo de volta';
      if (subtitle) subtitle.innerText = mode === 'signup' ? 'Comece a criar imagens e vídeos com IA em segundos.' : 'Insira seus dados para acessar o laboratório.';
      if (loginBtn) loginBtn.innerText = mode === 'signup' ? 'Criar conta' : 'Entrar';
      
      const signupFields = document.getElementById('signup-fields');
      if (signupFields) signupFields.style.display = mode === 'signup' ? 'block' : 'none';
      
      window.currentAuthMode = mode;
    }
    
    setAuthMode('signup');
  </script>
  <script src="/main.js"></script>
</body>
</html>
